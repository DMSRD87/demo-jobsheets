<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dawson Electrical — Job Manager</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f6fa; color: #1a1a2e; min-height: 100vh; }
  button { cursor: pointer; border: none; background: none; font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f1f1; } ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useMemo } = React;

const JOBS = [
  { id: 'JOB-001', customer: 'Margaret Hollis', address: '14 Pine St, Mount Gambier SA 5290', phone: '0412 338 221', email: 'mhollis@gmail.com', type: 'Switchboard Upgrade', status: 'completed', priority: 'high', date: '2026-03-10', due: '2026-03-10', quote: 2400, invoice: 2400, paid: true, notes: 'Full switchboard upgrade to RCD protection. Customer requested extra GPO in kitchen.', photos: ['switchboard_before.jpg','switchboard_after.jpg','kitchen_gpo.jpg'], assignee: 'Jake D.' },
  { id: 'JOB-002', customer: 'Tom Bertuccio', address: '7 Ramsay Rd, Naracoorte SA 5271', phone: '0488 114 552', email: 'tombertuccio@hotmail.com', type: 'Solar Inspection', status: 'in-progress', priority: 'medium', date: '2026-03-20', due: '2026-03-28', quote: 350, invoice: null, paid: false, notes: 'Annual inspection of 6.6kW system. Inverter showing fault code — investigating.', photos: ['inverter_fault.jpg'], assignee: 'Chris W.' },
  { id: 'JOB-003', customer: 'Casterton Hardware', address: '2 Henty St, Casterton VIC 3311', phone: '0355 812 100', email: 'orders@casthardware.com.au', type: 'Commercial Lighting', status: 'pending', priority: 'high', date: '2026-03-27', due: '2026-04-05', quote: 8750, invoice: null, paid: false, notes: 'Replace fluorescent tubes throughout warehouse with LED panels. 48 fittings total.', photos: [], assignee: 'Unassigned' },
  { id: 'JOB-004', customer: 'Ryan Sousa', address: '33 Jubilee Ave, Hamilton VIC 3300', phone: '0421 776 903', email: 'ryansousa@gmail.com', type: 'Fault Finding', status: 'pending', priority: 'urgent', date: '2026-03-28', due: '2026-03-28', quote: 180, invoice: null, paid: false, notes: 'No power to back half of house. Suspected tripped breaker or damaged cable.', photos: [], assignee: 'Jake D.' },
  { id: 'JOB-005', customer: 'Blue Lake Motel', address: '1 Commercial St, Mount Gambier SA 5290', phone: '0887 245 600', email: 'manager@bluelakemotel.com.au', type: 'EV Charger Install', status: 'completed', priority: 'medium', date: '2026-03-05', due: '2026-03-07', quote: 3200, invoice: 3200, paid: true, notes: '2x Type 2 EV chargers installed in car park. Trenching and conduit run 18m.', photos: ['trench_run.jpg','charger1.jpg','charger2.jpg','completed.jpg'], assignee: 'Chris W.' },
  { id: 'JOB-006', customer: 'Linda Paech', address: '88 MacKillop St, Millicent SA 5280', phone: '0407 221 884', email: 'lindapaech@bigpond.com', type: 'Smoke Alarm Compliance', status: 'completed', priority: 'low', date: '2026-03-15', due: '2026-03-15', quote: 420, invoice: 420, paid: false, notes: '4x interconnected photoelectric alarms installed. Compliance certificate issued.', photos: ['alarm_install.jpg'], assignee: 'Jake D.' },
];

const STATUS = { pending: { label: 'Pending', color: '#b45309', bg: '#fef3c7' }, 'in-progress': { label: 'In Progress', color: '#1d4ed8', bg: '#dbeafe' }, completed: { label: 'Completed', color: '#166534', bg: '#dcfce7' } };
const PRIORITY_ORDER = { urgent: 0, high: 1, medium: 2, low: 3 };
const PRIORITY = { low: { label: 'Low', color: '#6b7280' }, medium: { label: 'Medium', color: '#d97706' }, high: { label: 'High', color: '#dc2626' }, urgent: { label: 'Urgent', color: '#7c3aed' } };

function Badge({ status }) {
  const s = STATUS[status];
  return <span style={{ background: s.bg, color: s.color, fontSize: 12, fontWeight: 600, padding: '3px 10px', borderRadius: 20, whiteSpace: 'nowrap' }}>{s.label}</span>;
}

function PriorityDot({ priority }) {
  return <span style={{ display: 'inline-block', width: 8, height: 8, borderRadius: '50%', background: PRIORITY[priority].color, marginRight: 6 }} />;
}

function Avatar({ name, size = 32 }) {
  const initials = name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
  const colors = ['#3b82f6','#8b5cf6','#ec4899','#10b981','#f59e0b','#ef4444'];
  const color = colors[name.charCodeAt(0) % colors.length];
  return <div style={{ width: size, height: size, borderRadius: '50%', background: color, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: size * 0.38, fontWeight: 600, flexShrink: 0 }}>{initials}</div>;
}

function Stat({ label, value, accent }) {
  return (
    <div style={{ background: '#fff', borderRadius: 12, padding: '16px 20px', border: '1px solid #e8eaf0' }}>
      <p style={{ fontSize: 12, color: '#6b7280', marginBottom: 4 }}>{label}</p>
      <p style={{ fontSize: 24, fontWeight: 700, color: accent || '#1a1a2e' }}>{value}</p>
    </div>
  );
}

function FilterBar({ filters, setFilters, sort, setSort }) {
  const [showFilters, setShowFilters] = useState(false);
  const activeFilterCount = [filters.status, filters.priority, filters.dateFrom, filters.dateTo].filter(Boolean).length;

  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', alignItems: 'center' }}>
        <input value={filters.search} onChange={e => setFilters(f => ({...f, search: e.target.value}))} placeholder="Search jobs, customers, addresses..." style={{ flex: 1, minWidth: 200, padding: '10px 14px', borderRadius: 10, border: '1px solid #e5e7eb', fontSize: 14, background: '#fff', outline: 'none' }} />
        <select value={sort} onChange={e => setSort(e.target.value)} style={{ padding: '10px 12px', borderRadius: 10, border: '1px solid #e5e7eb', fontSize: 13, fontWeight: 600, background: '#fff', color: '#374151', outline: 'none' }}>
          <option value="due-asc">Due date (soonest)</option>
          <option value="due-desc">Due date (latest)</option>
          <option value="quote-desc">Quote value (high→low)</option>
          <option value="quote-asc">Quote value (low→high)</option>
          <option value="customer-asc">Customer (A→Z)</option>
          <option value="priority-asc">Priority (urgent first)</option>
        </select>
        <button onClick={() => setShowFilters(f => !f)} style={{ padding: '10px 16px', borderRadius: 10, border: '1px solid #e5e7eb', fontSize: 13, fontWeight: 600, background: activeFilterCount > 0 ? '#1e3a5f' : '#fff', color: activeFilterCount > 0 ? '#fff' : '#374151' }}>
          ⚙ Filters {activeFilterCount > 0 && `(${activeFilterCount})`}
        </button>
        {activeFilterCount > 0 && (
          <button onClick={() => setFilters(f => ({ ...f, status: '', priority: '', dateFrom: '', dateTo: '' }))} style={{ padding: '10px 14px', borderRadius: 10, border: '1px solid #fecaca', fontSize: 13, fontWeight: 600, color: '#dc2626', background: '#fff' }}>Clear</button>
        )}
      </div>
      {showFilters && (
        <div style={{ background: '#fff', border: '1px solid #e5e7eb', borderRadius: 12, padding: 16, marginTop: 10, display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))', gap: 12 }}>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: '#6b7280', display: 'block', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 }}>Status</label>
            <select value={filters.status} onChange={e => setFilters(f => ({...f, status: e.target.value}))} style={{ width: '100%', padding: '8px 10px', borderRadius: 8, border: '1px solid #e5e7eb', fontSize: 13, background: '#f9fafb', outline: 'none' }}>
              <option value="">All statuses</option>
              <option value="pending">Pending</option>
              <option value="in-progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: '#6b7280', display: 'block', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 }}>Priority</label>
            <select value={filters.priority} onChange={e => setFilters(f => ({...f, priority: e.target.value}))} style={{ width: '100%', padding: '8px 10px', borderRadius: 8, border: '1px solid #e5e7eb', fontSize: 13, background: '#f9fafb', outline: 'none' }}>
              <option value="">All priorities</option>
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: '#6b7280', display: 'block', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 }}>Due from</label>
            <input type="date" value={filters.dateFrom} onChange={e => setFilters(f => ({...f, dateFrom: e.target.value}))} style={{ width: '100%', padding: '8px 10px', borderRadius: 8, border: '1px solid #e5e7eb', fontSize: 13, background: '#f9fafb', outline: 'none' }} />
          </div>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: '#6b7280', display: 'block', marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 }}>Due to</label>
            <input type="date" value={filters.dateTo} onChange={e => setFilters(f => ({...f, dateTo: e.target.value}))} style={{ width: '100%', padding: '8px 10px', borderRadius: 8, border: '1px solid #e5e7eb', fontSize: 13, background: '#f9fafb', outline: 'none' }} />
          </div>
        </div>
      )}
    </div>
  );
}

function JobCard({ job, onClick }) {
  return (
    <div onClick={() => onClick(job)} style={{ background: '#fff', borderRadius: 12, border: '1px solid #e8eaf0', padding: '18px 20px', cursor: 'pointer', marginBottom: 10 }}
      onMouseEnter={e => e.currentTarget.style.boxShadow = '0 4px 16px rgba(0,0,0,0.08)'}
      onMouseLeave={e => e.currentTarget.style.boxShadow = 'none'}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
            <span style={{ fontSize: 12, color: '#9ca3af', fontWeight: 600 }}>{job.id}</span>
            <PriorityDot priority={job.priority} />
            <span style={{ fontSize: 12, color: PRIORITY[job.priority].color, fontWeight: 600 }}>{PRIORITY[job.priority].label}</span>
          </div>
          <p style={{ fontWeight: 600, fontSize: 15, marginBottom: 2 }}>{job.customer}</p>
          <p style={{ fontSize: 13, color: '#6b7280', marginBottom: 6 }}>{job.type}</p>
          <p style={{ fontSize: 12, color: '#9ca3af' }}>{job.address}</p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 8, flexShrink: 0 }}>
          <Badge status={job.status} />
          <span style={{ fontSize: 13, fontWeight: 700 }}>${job.quote?.toLocaleString()}</span>
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 14, paddingTop: 12, borderTop: '1px solid #f3f4f6' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Avatar name={job.assignee === 'Unassigned' ? 'U' : job.assignee} size={24} />
          <span style={{ fontSize: 12, color: '#6b7280' }}>{job.assignee}</span>
        </div>
        <span style={{ fontSize: 12, color: '#9ca3af' }}>Due {new Date(job.due).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })}</span>
      </div>
    </div>
  );
}

function PhotoGrid({ photos }) {
  if (!photos.length) return <p style={{ fontSize: 13, color: '#9ca3af', fontStyle: 'italic' }}>No photos uploaded yet</p>;
  const colors = ['#dbeafe','#dcfce7','#fef3c7','#fce7f3','#ede9fe'];
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
      {photos.map((p, i) => (
        <div key={i} style={{ background: colors[i % colors.length], borderRadius: 8, height: 72, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: '#6b7280', textAlign: 'center', padding: 6 }}>{p.replace('.jpg','').replace(/_/g,' ')}</div>
      ))}
      <div style={{ background: '#f9fafb', borderRadius: 8, height: 72, display: 'flex', alignItems: 'center', justifyContent: 'center', border: '2px dashed #e5e7eb', cursor: 'pointer', fontSize: 22, color: '#d1d5db' }}>+</div>
    </div>
  );
}

function JobDetail({ job, onBack }) {
  const [tab, setTab] = useState('details');
  return (
    <div style={{ maxWidth: 680, margin: '0 auto' }}>
      <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: 6, color: '#3b82f6', fontSize: 14, fontWeight: 600, marginBottom: 20, padding: 0 }}>← Back to jobs</button>
      <div style={{ background: '#fff', borderRadius: 16, border: '1px solid #e8eaf0', overflow: 'hidden' }}>
        <div style={{ padding: '24px 28px', borderBottom: '1px solid #f3f4f6' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
            <div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                <span style={{ fontSize: 13, color: '#9ca3af', fontWeight: 600 }}>{job.id}</span>
                <Badge status={job.status} />
              </div>
              <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 2 }}>{job.customer}</h2>
              <p style={{ fontSize: 15, color: '#6b7280' }}>{job.type}</p>
            </div>
            <div style={{ textAlign: 'right' }}>
              <p style={{ fontSize: 13, color: '#9ca3af' }}>Quote value</p>
              <p style={{ fontSize: 26, fontWeight: 700 }}>${job.quote?.toLocaleString()}</p>
            </div>
          </div>
        </div>
        <div style={{ display: 'flex', borderBottom: '1px solid #f3f4f6' }}>
          {['details','invoice','photos'].map(t => (
            <button key={t} onClick={() => setTab(t)} style={{ flex: 1, padding: '14px 0', fontSize: 14, fontWeight: 600, color: tab === t ? '#3b82f6' : '#6b7280', borderBottom: tab === t ? '2px solid #3b82f6' : '2px solid transparent', background: 'none', textTransform: 'capitalize' }}>{t}</button>
          ))}
        </div>
        <div style={{ padding: '24px 28px' }}>
          {tab === 'details' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
              <div>
                <p style={{ fontSize: 12, fontWeight: 600, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Customer</p>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
                  <Avatar name={job.customer} size={44} />
                  <div>
                    <p style={{ fontWeight: 600, fontSize: 16 }}>{job.customer}</p>
                    <p style={{ fontSize: 13, color: '#6b7280' }}>{job.phone}</p>
                    <p style={{ fontSize: 13, color: '#3b82f6' }}>{job.email}</p>
                  </div>
                </div>
                <p style={{ fontSize: 13, color: '#6b7280', background: '#f9fafb', padding: '10px 14px', borderRadius: 8 }}>📍 {job.address}</p>
              </div>
              <div>
                <p style={{ fontSize: 12, fontWeight: 600, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Job details</p>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                  {[['Assigned to', job.assignee], ['Priority', PRIORITY[job.priority].label], ['Scheduled', new Date(job.date).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' })], ['Due date', new Date(job.due).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' })]].map(([k,v]) => (
                    <div key={k} style={{ background: '#f9fafb', borderRadius: 8, padding: '12px 14px' }}>
                      <p style={{ fontSize: 11, color: '#9ca3af', fontWeight: 600, marginBottom: 4 }}>{k}</p>
                      <p style={{ fontSize: 14, fontWeight: 600 }}>{v}</p>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <p style={{ fontSize: 12, fontWeight: 600, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 8 }}>Notes</p>
                <p style={{ fontSize: 14, lineHeight: 1.6, color: '#374151', background: '#f9fafb', padding: '12px 14px', borderRadius: 8 }}>{job.notes}</p>
              </div>
            </div>
          )}
          {tab === 'invoice' && (
            <div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 24 }}>
                <div style={{ background: '#f9fafb', borderRadius: 10, padding: '14px 16px', textAlign: 'center' }}>
                  <p style={{ fontSize: 12, color: '#9ca3af', marginBottom: 4 }}>Quote</p>
                  <p style={{ fontSize: 20, fontWeight: 700 }}>${job.quote?.toLocaleString()}</p>
                </div>
                <div style={{ background: '#f9fafb', borderRadius: 10, padding: '14px 16px', textAlign: 'center' }}>
                  <p style={{ fontSize: 12, color: '#9ca3af', marginBottom: 4 }}>Invoiced</p>
                  <p style={{ fontSize: 20, fontWeight: 700, color: job.invoice ? '#166534' : '#9ca3af' }}>{job.invoice ? `$${job.invoice.toLocaleString()}` : '—'}</p>
                </div>
                <div style={{ background: job.paid ? '#dcfce7' : '#fef3c7', borderRadius: 10, padding: '14px 16px', textAlign: 'center' }}>
                  <p style={{ fontSize: 12, color: '#9ca3af', marginBottom: 4 }}>Status</p>
                  <p style={{ fontSize: 15, fontWeight: 700, color: job.paid ? '#166534' : '#b45309' }}>{job.paid ? 'Paid' : 'Unpaid'}</p>
                </div>
              </div>
              {!job.invoice ? (
                <div style={{ textAlign: 'center', padding: '32px 0', background: '#f9fafb', borderRadius: 12 }}>
                  <p style={{ color: '#9ca3af', fontSize: 14, marginBottom: 16 }}>No invoice raised yet</p>
                  <button style={{ background: '#3b82f6', color: '#fff', padding: '10px 24px', borderRadius: 8, fontSize: 14, fontWeight: 600 }}>Raise Invoice</button>
                </div>
              ) : (
                <div style={{ background: '#f9fafb', borderRadius: 12, padding: 20 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
                    <p style={{ fontWeight: 600 }}>Invoice #{job.id.replace('JOB','INV')}</p>
                    <button style={{ color: '#3b82f6', fontSize: 13, fontWeight: 600 }}>Download PDF</button>
                  </div>
                  {[['Labour', Math.round(job.invoice * 0.6)], ['Materials', Math.round(job.invoice * 0.35)], ['GST (10%)', Math.round(job.invoice * 0.05)]].map(([k,v]) => (
                    <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: '1px solid #e5e7eb', fontSize: 14 }}>
                      <span style={{ color: '#6b7280' }}>{k}</span>
                      <span style={{ fontWeight: 600 }}>${v.toLocaleString()}</span>
                    </div>
                  ))}
                  <div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: 12, fontWeight: 700, fontSize: 16 }}>
                    <span>Total</span><span>${job.invoice.toLocaleString()}</span>
                  </div>
                </div>
              )}
            </div>
          )}
          {tab === 'photos' && (
            <div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                <p style={{ fontSize: 14, color: '#6b7280' }}>{job.photos.length} photo{job.photos.length !== 1 ? 's' : ''} attached</p>
                <button style={{ background: '#3b82f6', color: '#fff', padding: '8px 16px', borderRadius: 8, fontSize: 13, fontWeight: 600 }}>Upload photo</button>
              </div>
              <PhotoGrid photos={job.photos} />
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function NewJobModal({ onClose, onSave }) {
  const [form, setForm] = useState({ customer: '', address: '', phone: '', type: '', notes: '', quote: '', priority: 'medium', due: '' });
  const set = (k, v) => setForm(f => ({...f, [k]: v}));
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 100, padding: 20 }}>
      <div style={{ background: '#fff', borderRadius: 16, width: '100%', maxWidth: 520, maxHeight: '90vh', overflowY: 'auto' }}>
        <div style={{ padding: '20px 24px', borderBottom: '1px solid #f3f4f6', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h3 style={{ fontSize: 17, fontWeight: 700 }}>New job</h3>
          <button onClick={onClose} style={{ fontSize: 20, color: '#9ca3af' }}>×</button>
        </div>
        <div style={{ padding: '20px 24px', display: 'flex', flexDirection: 'column', gap: 14 }}>
          {[['Customer name','customer','text'],['Address','address','text'],['Phone','phone','text'],['Job type','type','text'],['Quote ($)','quote','number'],['Due date','due','date']].map(([label, key, type]) => (
            <div key={key}>
              <label style={{ fontSize: 13, fontWeight: 600, color: '#374151', display: 'block', marginBottom: 6 }}>{label}</label>
              <input type={type} value={form[key]} onChange={e => set(key, e.target.value)} style={{ width: '100%', padding: '10px 12px', borderRadius: 8, border: '1px solid #e5e7eb', fontSize: 14, outline: 'none' }} />
            </div>
          ))}
          <div>
            <label style={{ fontSize: 13, fontWeight: 600, color: '#374151', display: 'block', marginBottom: 6 }}>Priority</label>
            <select value={form.priority} onChange={e => set('priority', e.target.value)} style={{ width: '100%', padding: '10px 12px', borderRadius: 8, border: '1px solid #e5e7eb', fontSize: 14 }}>
              {Object.entries(PRIORITY).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize: 13, fontWeight: 600, color: '#374151', display: 'block', marginBottom: 6 }}>Notes</label>
            <textarea value={form.notes} onChange={e => set('notes', e.target.value)} rows={3} style={{ width: '100%', padding: '10px 12px', borderRadius: 8, border: '1px solid #e5e7eb', fontSize: 14, resize: 'vertical' }} />
          </div>
        </div>
        <div style={{ padding: '16px 24px', borderTop: '1px solid #f3f4f6', display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
          <button onClick={onClose} style={{ padding: '10px 20px', borderRadius: 8, border: '1px solid #e5e7eb', fontSize: 14, fontWeight: 600, color: '#6b7280' }}>Cancel</button>
          <button onClick={() => { onSave(form); onClose(); }} style={{ padding: '10px 20px', borderRadius: 8, background: '#3b82f6', color: '#fff', fontSize: 14, fontWeight: 600 }}>Create job</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [jobs, setJobs] = useState(JOBS);
  const [selected, setSelected] = useState(null);
  const [filters, setFilters] = useState({ search: '', status: '', priority: '', dateFrom: '', dateTo: '' });
  const [sort, setSort] = useState('due-asc');
  const [showNew, setShowNew] = useState(false);

  const stats = useMemo(() => ({
    total: jobs.length,
    pending: jobs.filter(j => j.status === 'pending').length,
    inProgress: jobs.filter(j => j.status === 'in-progress').length,
    revenue: jobs.filter(j => j.paid).reduce((s, j) => s + j.invoice, 0),
    outstanding: jobs.filter(j => j.invoice && !j.paid).reduce((s, j) => s + j.invoice, 0),
  }), [jobs]);

  const processed = useMemo(() => {
    let result = jobs.filter(j => {
      if (filters.status && j.status !== filters.status) return false;
      if (filters.priority && j.priority !== filters.priority) return false;
      if (filters.dateFrom && j.due < filters.dateFrom) return false;
      if (filters.dateTo && j.due > filters.dateTo) return false;
      if (filters.search) {
        const s = filters.search.toLowerCase();
        if (!j.customer.toLowerCase().includes(s) && !j.type.toLowerCase().includes(s) && !j.address.toLowerCase().includes(s)) return false;
      }
      return true;
    });
    return [...result].sort((a, b) => {
      switch (sort) {
        case 'due-asc': return a.due.localeCompare(b.due);
        case 'due-desc': return b.due.localeCompare(a.due);
        case 'quote-desc': return (b.quote||0)-(a.quote||0);
        case 'quote-asc': return (a.quote||0)-(b.quote||0);
        case 'customer-asc': return a.customer.localeCompare(b.customer);
        case 'priority-asc': return PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority];
        default: return 0;
      }
    });
  }, [jobs, filters, sort]);

  const addJob = (form) => {
    setJobs(j => [{ ...form, id: `JOB-00${j.length+1}`, status: 'pending', date: new Date().toISOString().split('T')[0], quote: Number(form.quote), invoice: null, paid: false, photos: [], assignee: 'Unassigned', email: '' }, ...j]);
  };

  if (selected) return (
    <div style={{ padding: '24px 16px', maxWidth: 720, margin: '0 auto' }}>
      <JobDetail job={selected} onBack={() => setSelected(null)} />
    </div>
  );

  return (
    <div style={{ minHeight: '100vh', background: '#f5f6fa' }}>
      {showNew && <NewJobModal onClose={() => setShowNew(false)} onSave={addJob} />}
      <div style={{ background: '#1e3a5f', padding: '0 24px' }}>
        <div style={{ maxWidth: 900, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 60 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 32, height: 32, background: '#f59e0b', borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 16, color: '#fff' }}>D</div>
            <div>
              <p style={{ color: '#fff', fontWeight: 700, fontSize: 15, lineHeight: 1.2 }}>Dawson Electrical</p>
              <p style={{ color: '#93c5fd', fontSize: 11 }}>Job Management</p>
            </div>
          </div>
          <button onClick={() => setShowNew(true)} style={{ background: '#f59e0b', color: '#fff', padding: '8px 18px', borderRadius: 8, fontWeight: 700, fontSize: 14 }}>+ New Job</button>
        </div>
      </div>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: '24px 16px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(130px, 1fr))', gap: 12, marginBottom: 24 }}>
          <Stat label="Total jobs" value={stats.total} />
          <Stat label="Pending" value={stats.pending} accent="#b45309" />
          <Stat label="In progress" value={stats.inProgress} accent="#1d4ed8" />
          <Stat label="Revenue (paid)" value={`$${stats.revenue.toLocaleString()}`} accent="#166534" />
          <Stat label="Outstanding" value={`$${stats.outstanding.toLocaleString()}`} accent="#dc2626" />
        </div>
        <FilterBar filters={filters} setFilters={setFilters} sort={sort} setSort={setSort} />
        <p style={{ fontSize: 13, color: '#9ca3af', marginBottom: 12 }}>{processed.length} job{processed.length !== 1 ? 's' : ''} showing</p>
        {processed.length === 0 && <div style={{ textAlign: 'center', padding: '48px 0', color: '#9ca3af' }}>No jobs match your filters</div>}
        {processed.map(job => <JobCard key={job.id} job={job} onClick={setSelected} />)}
        <p style={{ textAlign: 'center', fontSize: 12, color: '#d1d5db', marginTop: 32 }}>Powered by Southern Reach Digital · southernreachdigital.com.au</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
